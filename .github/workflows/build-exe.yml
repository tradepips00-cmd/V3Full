name: Build Panel Loop Full V3 Pro EXE

on:
  workflow_dispatch:

jobs:
  build-windows-exe:
    runs-on: windows-latest

    steps:
      - name: Checkout files
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller
        run: python -m pip install pyinstaller

      - name: Build EXE
        run: python -m PyInstaller --onefile --windowed --name PanelLoopFullV3Pro Panel_Loop_Full_V3_Pro.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: PanelLoopFullV3Pro-Windows-EXE
          path: dist/PanelLoopFullV3Pro.exe
